version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: gatewaydb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - micro-net

  config-server:
    image: razibhossain/config-server
    ports:
      - "8888:8888"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - micro-net

  discovery-service:
    image: razibhossain/discovery-service
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    restart: always
    environment:
      SPRING_APPLICATION_NAME: discovery-service
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS: "50"
      SERVER_PORT: "8761"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      EUREKA_SERVER_ENABLE_SELF_PRESERVATION: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - micro-net

  auth-service:
    image: razibhossain/authservice
    ports:
      - "9001:9001"
    depends_on:
      - mysql
      - discovery-service
      - config-server
    restart: always
    environment:
      SPRING_APPLICATION_NAME: auth-service
      SERVER_PORT: "9001"
      EUREKA_INSTANCE_NON_SECURE_PORT: "9001"
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS: "50"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/authdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - micro-net

  product-service:
    image: razibhossain/product-service
    ports:
      - "9010:9010"
    depends_on:
      - mysql
      - discovery-service
      - config-server
    restart: always
    environment:
      SPRING_APPLICATION_NAME: product-service
      SERVER_PORT: "9010"
      EUREKA_INSTANCE_NON_SECURE_PORT: "9010"
      EUREKA_INSTANCE_HOSTNAME: product-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS: "50"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/productdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - micro-net

  order-service:
    image: razibhossain/order-service
    ports:
      - "9020:9020"
    depends_on:
      - mysql
      - discovery-service
      - config-server
    restart: always
    environment:
      SPRING_APPLICATION_NAME: order-service
      SERVER_PORT: "9020"
      EUREKA_INSTANCE_NON_SECURE_PORT: "9020"
      EUREKA_INSTANCE_HOSTNAME: order-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS: "50"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/orderdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9020/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - micro-net

  payment-service:
    image: razibhossain/payment-service
    ports:
      - "9030:9030"
    depends_on:
      - mysql
      - discovery-service
      - config-server
    restart: always
    environment:
      SPRING_APPLICATION_NAME: payment-service
      SERVER_PORT: "9030"
      EUREKA_INSTANCE_NON_SECURE_PORT: "9030"
      EUREKA_INSTANCE_HOSTNAME: payment-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS: "50"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/paymentdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9030/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - micro-net

  api-gateway:
    image: razibhossain/apigateway
    ports:
      - "9000:9000"
    depends_on:
      - discovery-service
      - config-server
      - mysql
      - auth-service
    restart: always
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: "9000"
      EUREKA_INSTANCE_NON_SECURE_PORT: "9000"
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS: "50"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gatewaydb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:9001/.well-known/jwks.json
      SECURITY_AUTHORIZATION_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - micro-net

  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge

volumes:
  mysql-data: