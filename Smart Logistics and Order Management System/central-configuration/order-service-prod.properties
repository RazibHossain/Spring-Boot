server.port=9020

spring.datasource.url=jdbc:mysql://localhost:3306/orderservice
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker
resilience4j.circuitbreaker.instances.payment-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.payment-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.payment-service.waitDurationInOpenState=10s

# Retry
resilience4j.retry.instances.payment-service.maxAttempts=3
resilience4j.retry.instances.payment-service.waitDuration=1s

# TimeLimiter (Timeout)
resilience4j.timelimiter.instances.payment-service.timeoutDuration=3s


# Circuit Breaker
resilience4j.circuitbreaker.instances.product-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.product-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.product-service.waitDurationInOpenState=10s

# Retry
resilience4j.retry.instances.product-service.maxAttempts=3
resilience4j.retry.instances.product-service.waitDuration=1s

# TimeLimiter (Timeout)
resilience4j.timelimiter.instances.product-service.timeoutDuration=3s

eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
management.tracing.export.zipkin.endpoint=http://zipkin:9411/api/v2/spans