eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# sampling only — no management.tracing.enabled needed
management.tracing.sampling.probability=1.0

# correct endpoint property for Boot 4
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

# correct loggers for MVC gateway (not reactive)
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.io.micrometer.tracing=DEBUG