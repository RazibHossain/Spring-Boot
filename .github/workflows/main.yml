name: Api Gateway CI

on:
  push:
    paths:
      - 'Smart Logistics and Order Management System/apigateway/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Smart Logistics and Order Management System/apigateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/apigateway .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/apigateway
